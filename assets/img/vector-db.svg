<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Base de données vectorielle</title>
  <desc id="desc">Diagramme du passage documents vers vecteurs puis recherche sémantique.</desc>
  <rect width="960" height="540" rx="24" fill="#0B1020"/>
  <text x="60" y="70" fill="#F8FAFC" font-size="34" font-family="Inter, Arial" font-weight="700">Base de données vectorielle</text>

  <rect x="60" y="150" width="190" height="72" rx="16" fill="#1E40AF"/>
  <text x="92" y="195" fill="white" font-size="24" font-family="Inter, Arial">Documents</text>

  <rect x="300" y="150" width="190" height="72" rx="16" fill="#2563EB"/>
  <text x="345" y="195" fill="white" font-size="24" font-family="Inter, Arial">Vecteurs</text>

  <rect x="540" y="150" width="220" height="72" rx="16" fill="#3B82F6"/>
  <text x="575" y="195" fill="white" font-size="24" font-family="Inter, Arial">Proximité sens</text>

  <rect x="300" y="290" width="350" height="160" rx="20" fill="#111827" stroke="#60A5FA" stroke-width="3"/>
  <text x="390" y="340" fill="#DBEAFE" font-size="26" font-family="Inter, Arial" font-weight="700">Recherche</text>
  <text x="370" y="380" fill="#DBEAFE" font-size="26" font-family="Inter, Arial" font-weight="700">sémantique</text>
  <text x="360" y="420" fill="#93C5FD" font-size="20" font-family="Inter, Arial">retrouve les contenus proches</text>

  <rect x="760" y="320" width="150" height="90" rx="16" fill="#F97316"/>
  <text x="780" y="375" fill="white" font-size="24" font-family="Inter, Arial" font-weight="700">Contexte</text>

  <path d="M255 186H288" stroke="#93C5FD" stroke-width="5" stroke-linecap="round"/>
  <path d="M495 186H528" stroke="#93C5FD" stroke-width="5" stroke-linecap="round"/>
  <path d="M650 226V280" stroke="#93C5FD" stroke-width="5" stroke-linecap="round"/>
  <path d="M655 360H750" stroke="#FDBA74" stroke-width="6" stroke-linecap="round"/>
</svg>
